<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Mailbox{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/semantic-ui@2.5.0/dist/semantic.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/semantic-ui@2.5.0/dist/semantic.min.js"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        body { background: #f7f7f7; }
        .full-height { height: calc(100vh - 50px); overflow: hidden; }
        .scroll-y { overflow-y: auto; }
    </style>
</head>
<body>
    {% if user_id %}
    <div class="ui inverted menu" style="margin-bottom: 0; border-radius: 0;">
        <a class="header item" href="/web/inbox">AI Mailbox</a>
        <a class="item" href="/web/inbox">Inbox</a>
        <a class="item" hx-get="/web/compose" hx-target="#main-content" hx-push-url="true">Compose</a>
        <div class="right menu">
            <div class="item">{{ display_name }}</div>
            <a class="item" href="/web/logout" style="color: #ff6b6b;">Logout</a>
        </div>
    </div>
    {% endif %}

    <main>
        {% block content %}{% endblock %}
    </main>

    <script>
        // Re-initialize Semantic UI components after HTMX swaps
        document.body.addEventListener('htmx:afterSwap', function() {
            // Preserve clearable on filter dropdowns, plain init for others
            $('#project-filter, #participant-filter').closest('.ui.dropdown').dropdown({clearable: true});
            $('.ui.dropdown').not('#project-filter, #participant-filter').not(
                $('#project-filter, #participant-filter').closest('.ui.dropdown')
            ).dropdown();
        });
    </script>
</body>
</html>
