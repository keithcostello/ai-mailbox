{% extends "base.html" %}
{% block title %}Health - AI Mailbox{% endblock %}
{% block content %}
<div class="ui container" style="padding-top: 2em;">
    <h2 class="ui header">System Health</h2>
    <table class="ui celled table">
        <tbody>
            <tr>
                <td><strong>Status</strong></td>
                <td>
                    {% if health.status == 'healthy' %}
                    <span style="color: green; font-weight: bold;">HEALTHY</span>
                    {% else %}
                    <span style="color: red; font-weight: bold;">UNHEALTHY</span>
                    {% endif %}
                </td>
            </tr>
            <tr>
                <td><strong>Version</strong></td>
                <td>{{ health.version }}</td>
            </tr>
            <tr>
                <td><strong>Users</strong></td>
                <td>{{ health.user_count }}</td>
            </tr>
            <tr>
                <td><strong>Auth</strong></td>
                <td>{{ health.auth }}</td>
            </tr>
        </tbody>
    </table>
</div>
{% endblock %}
