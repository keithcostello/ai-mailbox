{% extends "base.html" %}
{% block title %}Login - AI Mailbox{% endblock %}
{% block content %}
<div class="ui middle aligned center aligned grid" style="height: 80vh;">
    <div class="column" style="max-width: 400px;">
        <h2 class="ui header" style="text-align: center;">AI Mailbox</h2>

        {% if error %}
        <div class="ui negative message">
            <p>{{ error }}</p>
        </div>
        {% endif %}

        <form method="POST" action="/web/login" class="ui large form segment">
            <div class="field">
                <label>Username</label>
                <div class="ui left icon input">
                    <i class="user icon"></i>
                    <input type="text" name="username" placeholder="Username" required autofocus>
                </div>
            </div>
            <div class="field">
                <label>Password</label>
                <div class="ui left icon input">
                    <i class="lock icon"></i>
                    <input type="password" name="password" placeholder="Password" required>
                </div>
            </div>
            <button class="ui fluid large blue submit button" type="submit">Sign in</button>
        </form>
    </div>
</div>
{% endblock %}
