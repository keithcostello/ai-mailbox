{% extends "base.html" %}
{% block title %}Login - AI Mailbox{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-16">
    <h1 class="text-2xl font-bold text-gray-900 text-center mb-8">AI Mailbox</h1>

    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded mb-6 text-sm">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/web/login" class="bg-white shadow rounded-lg p-6 space-y-4">
        <div>
            <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
            <input type="text" id="username" name="username" required autofocus
                   class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
        <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" id="password" name="password" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
        <button type="submit"
                class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 font-medium">
            Sign in
        </button>
    </form>
</div>
{% endblock %}
