{% extends "base.html" %}
{% block title %}Sign In - AI Mailbox{% endblock %}
{% block content %}
<div class="flex items-center justify-center min-h-screen">
    <div class="card w-96 bg-base-100 shadow-xl">
        <div class="card-body">
            <h2 class="card-title justify-center text-2xl mb-2">Sign In</h2>
            {% if error %}
            <div class="alert alert-error text-sm">
                <span>{{ error }}</span>
            </div>
            {% endif %}
            <form method="POST" action="/web/login" class="space-y-4">
                <div class="form-control">
                    <label class="label"><span class="label-text">Username</span></label>
                    <input type="text" name="username" class="input input-bordered w-full" required autofocus>
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text">Password</span></label>
                    <input type="password" name="password" class="input input-bordered w-full" required>
                </div>
                <button type="submit" class="btn btn-primary w-full">Sign In</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
