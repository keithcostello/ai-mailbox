{% extends "base.html" %}
{% block title %}Inbox - AI Mailbox{% endblock %}
{% block content %}
<div class="ui grid full-height" style="margin: 0;">
    <!-- Sidebar: conversation list with filters -->
    <div class="four wide column scroll-y" id="sidebar" style="background: #fff; border-right: 1px solid #ddd; padding: 0;">
        <div style="padding: 10px;">
            <div class="ui mini form">
                <div class="field">
                    <select class="ui compact selection dropdown" id="project-filter" style="width: 100%;">
                        <option value="">All projects</option>
                        {% for p in projects %}
                        <option value="{{ p }}" {% if project_filter == p %}selected{% endif %}>{{ p }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="field">
                    <select class="ui compact selection dropdown" id="participant-filter" style="width: 100%;">
                        <option value="">All people</option>
                        {% for p in partners %}
                        <option value="{{ p }}" {% if participant_filter == p %}selected{% endif %}>{{ p }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <a href="#" id="clear-filters" style="display: block; text-align: center; font-size: 0.85em; color: #999; margin-top: 4px;">Clear filters</a>
        </div>
        <div class="ui divider" style="margin: 0;"></div>
        <div id="conversation-list"
             hx-get="/web/inbox/conversations{% if project_filter %}?project={{ project_filter }}{% endif %}{% if participant_filter %}&participant={{ participant_filter }}{% endif %}"
             hx-trigger="load"
             hx-swap="innerHTML">
        </div>
    </div>

    <!-- Main content area -->
    <div class="twelve wide column scroll-y" id="main-content" style="padding: 20px;">
        {% if thread_content %}
        {{ thread_content | safe }}
        {% else %}
        {% include "partials/empty_state.html" %}
        {% endif %}
    </div>
</div>

<script>
$(function() {
    $('#project-filter, #participant-filter').closest('.ui.dropdown').dropdown({clearable: true});
    $('.ui.dropdown').not('#project-filter, #participant-filter').not(
        $('#project-filter, #participant-filter').closest('.ui.dropdown')
    ).dropdown();

    // Clear filters link resets both dropdowns
    $('#clear-filters').on('click', function(e) {
        e.preventDefault();
        $('#project-filter').val('');
        $('#project-filter').closest('.ui.dropdown').find('.text').text('All projects').addClass('default');
        $('#participant-filter').val('');
        $('#participant-filter').closest('.ui.dropdown').find('.text').text('All people').addClass('default');
        htmx.ajax('GET', '/web/inbox/conversations', '#conversation-list');
    });

    // Wire filter dropdowns to refresh conversation list
    $('#project-filter').on('change', function() {
        var project = $(this).val();
        var participant = $('#participant-filter').val();
        var url = '/web/inbox/conversations?project=' + encodeURIComponent(project) + '&participant=' + encodeURIComponent(participant);
        htmx.ajax('GET', url, '#conversation-list');
    });
    $('#participant-filter').on('change', function() {
        var project = $('#project-filter').val();
        var participant = $(this).val();
        var url = '/web/inbox/conversations?project=' + encodeURIComponent(project) + '&participant=' + encodeURIComponent(participant);
        htmx.ajax('GET', url, '#conversation-list');
    });
});
</script>
{% endblock %}
