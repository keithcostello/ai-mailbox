<!DOCTYPE html>
<html lang="en" data-theme="corporate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mailbox</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .prose-msg pre { background: oklch(var(--b2)); padding: 0.5rem; border-radius: 0.25rem; overflow-x: auto; }
        .prose-msg code { font-size: 0.8125em; }
        .prose-msg p { margin: 0.125rem 0; }
        .prose-msg ul, .prose-msg ol { margin: 0.125rem 0; padding-left: 1.25rem; }
        .prose-msg table { border-collapse: collapse; margin: 0.25rem 0; font-size: 0.8125em; }
        .prose-msg th, .prose-msg td { border: 1px solid oklch(var(--b3)); padding: 0.125rem 0.375rem; }
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
        #app { min-height: 300px; max-height: 500px; overflow-y: auto; }
    </style>
</head>
<body class="bg-base-100">
<div id="app" class="flex flex-col">
    <div id="loading" class="flex items-center justify-center h-64 text-base-content/30">
        <span class="loading loading-spinner loading-md"></span>
    </div>
</div>

<script type="module">
import { App } from "https://cdn.jsdelivr.net/npm/@modelcontextprotocol/ext-apps@1.2.2/+esm";

// --- State ---
const state = {
    view: "inbox",        // inbox | thread | compose
    user: null,
    conversations: [],
    currentThread: null,
    currentConvId: null,
    users: [],
    loading: true,
    error: null,
    hasMore: false,
};

const appEl = document.getElementById("app");

// --- MCP Apps client ---
const app = new App({ name: "AI Mailbox Inbox", version: "1.0.0" });

app.ontoolresult = (result) => {
    // Initial tool result from mailbox_list_messages
    try {
        const data = result.structuredContent || result.content?.find(c => c.type === "text");
        if (data) {
            const parsed = typeof data === "string" ? JSON.parse(data) : (data.text ? JSON.parse(data.text) : data);
            state.conversations = parsed.messages || [];
            state.hasMore = parsed.has_more || false;
        }
    } catch (e) {
        console.error("Failed to parse tool result:", e);
    }
    state.loading = false;
    render();
    startPolling();
    // Fetch identity
    loadIdentity();
};

app.connect();

// --- API helpers ---
async function callTool(name, args = {}) {
    try {
        return await app.callServerTool({ name, arguments: args });
    } catch (e) {
        console.error(`callServerTool(${name}) failed:`, e);
        state.error = e.message || "Tool call failed";
        render();
        return null;
    }
}

function parseResult(result) {
    if (!result) return null;
    const text = result.content?.find(c => c.type === "text")?.text;
    if (text) {
        try { return JSON.parse(text); } catch { return text; }
    }
    return result.structuredContent || null;
}

async function loadIdentity() {
    const result = await callTool("mailbox_whoami");
    const data = parseResult(result);
    if (data && data.user_id) {
        state.user = data;
        render();
    }
}

async function loadInbox() {
    const result = await callTool("mailbox_list_messages", {
        unread_only: false, limit: 50,
    });
    const data = parseResult(result);
    if (data && data.messages) {
        state.conversations = data.messages;
        state.hasMore = data.has_more || false;
        render();
    }
}

async function loadThread(messageId, convId) {
    state.loading = true;
    state.view = "thread";
    state.currentConvId = convId;
    render();

    const result = await callTool("mailbox_get_thread", {
        message_id: messageId, limit: 50, after_sequence: 0,
    });
    const data = parseResult(result);
    if (data) {
        state.currentThread = data;
        // Mark as read
        if (convId) {
            await callTool("mailbox_mark_read", { conversation_id: convId });
        }
    }
    state.loading = false;
    render();
}

async function sendReply(convId, messageId, body) {
    if (!body.trim()) return;
    const result = await callTool("mailbox_reply_to_message", {
        message_id: messageId, body: body,
    });
    const data = parseResult(result);
    if (data && data.message_id) {
        // Reload thread
        await loadThread(messageId, convId);
    }
}

async function sendNewMessage(to, body, project, subject) {
    if (!body.trim() || !to) return;
    const result = await callTool("mailbox_send_message", {
        to: to, body: body, project: project || "general",
        subject: subject || "",
    });
    const data = parseResult(result);
    if (data && !data.error) {
        state.view = "inbox";
        await loadInbox();
    }
}

async function loadUsers() {
    const result = await callTool("mailbox_list_users");
    const data = parseResult(result);
    if (data && data.users) {
        state.users = data.users;
    }
}

// --- Polling ---
let pollTimer = null;
function startPolling() {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(async () => {
        if (state.view === "inbox") {
            await loadInbox();
        }
    }, 15000);
}

// --- Relative time ---
function relativeTime(isoStr) {
    if (!isoStr) return "";
    const now = new Date();
    const then = new Date(isoStr);
    const diffMs = now - then;
    const diffSec = Math.floor(diffMs / 1000);
    if (diffSec < 60) return "just now";
    const diffMin = Math.floor(diffSec / 60);
    if (diffMin < 60) return `${diffMin}m ago`;
    const diffHr = Math.floor(diffMin / 60);
    if (diffHr < 24) return `${diffHr}h ago`;
    const diffDay = Math.floor(diffHr / 24);
    if (diffDay < 7) return `${diffDay}d ago`;
    return then.toLocaleDateString();
}

// --- Escape HTML ---
function esc(str) {
    if (!str) return "";
    return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

// --- Render ---
function render() {
    if (state.loading && state.view !== "thread") {
        appEl.innerHTML = `<div class="flex items-center justify-center h-64 text-base-content/30">
            <span class="loading loading-spinner loading-md"></span>
        </div>`;
        return;
    }

    if (state.view === "inbox") renderInbox();
    else if (state.view === "thread") renderThread();
    else if (state.view === "compose") renderCompose();
}

function renderInbox() {
    const header = `
        <div class="flex items-center justify-between px-3 py-2 border-b border-base-200 bg-base-100 sticky top-0 z-10">
            <div class="text-sm font-bold text-base-content">
                Inbox${state.user ? ` — ${esc(state.user.display_name)}` : ""}
            </div>
            <button onclick="window.__compose()" class="btn btn-primary btn-xs">Compose</button>
        </div>`;

    if (!state.conversations.length) {
        appEl.innerHTML = header + `
            <div class="flex items-center justify-center h-48 text-base-content/30">
                <div class="text-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 mx-auto mb-2 opacity-30" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/>
                    </svg>
                    <p class="text-xs">No messages yet</p>
                </div>
            </div>`;
        return;
    }

    // Group messages by conversation_id
    const convMap = new Map();
    for (const msg of state.conversations) {
        const cid = msg.conversation_id;
        if (!convMap.has(cid)) {
            convMap.set(cid, { messages: [], latest: msg, convId: cid });
        }
        convMap.get(cid).messages.push(msg);
        if (msg.created_at > convMap.get(cid).latest.created_at) {
            convMap.get(cid).latest = msg;
        }
    }

    let convHtml = "";
    for (const [cid, conv] of convMap) {
        const msg = conv.latest;
        const from = esc(msg.from_user || "");
        const body = esc((msg.body || "").slice(0, 80));
        const time = relativeTime(msg.created_at);
        const unread = conv.messages.length;
        const firstMsgId = conv.messages[0]?.id || msg.id;

        convHtml += `
        <div class="px-2.5 py-2 hover:bg-base-200/50 cursor-pointer border-b border-base-200 transition-colors"
             onclick="window.__openThread('${esc(firstMsgId)}', '${esc(cid)}')">
            <div class="flex items-center justify-between">
                <div class="text-sm font-medium text-base-content truncate flex-1">${from}</div>
                <span class="text-xs text-base-content/30 ml-2 shrink-0">${time}</span>
            </div>
            ${msg.subject ? `<div class="text-xs font-medium text-base-content/60 truncate mt-0.5">${esc(msg.subject)}</div>` : ""}
            <div class="text-xs text-base-content/40 truncate mt-0.5">${body}</div>
        </div>`;
    }

    appEl.innerHTML = header + `<div class="flex-1 overflow-y-auto">${convHtml}</div>`;
}

function renderThread() {
    const thread = state.currentThread;
    const backBtn = `
        <div class="flex items-center gap-2 px-3 py-2 border-b border-base-200 bg-base-100 sticky top-0 z-10">
            <button onclick="window.__backToInbox()" class="btn btn-ghost btn-xs">&larr; Back</button>
            <div class="text-sm font-bold text-base-content truncate">
                ${thread?.conversation?.project ? esc(thread.conversation.project) : "Thread"}
            </div>
        </div>`;

    if (state.loading || !thread) {
        appEl.innerHTML = backBtn + `
            <div class="flex items-center justify-center h-48 text-base-content/30">
                <span class="loading loading-spinner loading-md"></span>
            </div>`;
        return;
    }

    let msgsHtml = "";
    const messages = thread.messages || [];
    const lastMsgId = messages.length ? messages[messages.length - 1].id : null;

    for (const msg of messages) {
        const initials = esc((msg.from_user || "??").slice(0, 2).toUpperCase());
        const from = esc(msg.from_user || "");
        const time = relativeTime(msg.created_at);
        const body = esc(msg.body || "");
        const isAi = msg.user_type === "agent";
        const ackBadge = renderAckBadge(msg.ack_state);

        msgsHtml += `
        <div class="flex gap-3 py-3 px-3 border-b border-base-200 last:border-b-0">
            <div class="w-8 h-8 rounded bg-primary/10 flex items-center justify-center text-xs font-bold text-primary shrink-0 mt-0.5">${initials}</div>
            <div class="min-w-0 flex-1">
                <div class="flex items-center gap-2 mb-0.5">
                    <span class="text-sm font-bold text-base-content">${from}</span>
                    ${isAi ? '<span class="text-xs text-base-content/40 bg-base-200 px-1.5 py-0.5 rounded">Bot</span>' : ""}
                    <span class="text-xs text-base-content/30">${time}</span>
                    ${ackBadge}
                </div>
                <div class="prose-msg text-sm text-base-content/80">${body}</div>
                ${msg.truncated ? `<span class="text-xs text-base-content/30 italic">(truncated — ${msg.full_length} chars)</span>` : ""}
            </div>
        </div>`;
    }

    // Reply form
    const replyForm = `
        <div class="border-t border-base-200 px-3 py-2.5 bg-base-100 sticky bottom-0">
            <div class="flex gap-2 items-end">
                <textarea id="reply-body" rows="2" placeholder="Reply..."
                    class="textarea textarea-bordered flex-1 text-sm border-base-300 rounded"></textarea>
                <button onclick="window.__sendReply()" class="btn btn-neutral btn-sm h-9">Reply</button>
            </div>
        </div>`;

    appEl.innerHTML = backBtn + `<div class="flex-1 overflow-y-auto">${msgsHtml}</div>` + replyForm;

    // Scroll to bottom
    const scrollArea = appEl.querySelector(".overflow-y-auto");
    if (scrollArea) scrollArea.scrollTop = scrollArea.scrollHeight;
}

function renderAckBadge(ackState) {
    if (!ackState || ackState === "pending") return "";
    const colors = {
        received: "bg-info/10 text-info",
        processing: "bg-warning/10 text-warning",
        completed: "bg-success/10 text-success",
        failed: "bg-error/10 text-error",
    };
    const cls = colors[ackState] || "bg-base-200 text-base-content/40";
    return `<span class="text-xs px-1.5 py-0.5 rounded ${cls}">${esc(ackState)}</span>`;
}

function renderCompose() {
    const header = `
        <div class="flex items-center gap-2 px-3 py-2 border-b border-base-200 bg-base-100 sticky top-0 z-10">
            <button onclick="window.__backToInbox()" class="btn btn-ghost btn-xs">&larr; Back</button>
            <div class="text-sm font-bold text-base-content">Compose</div>
        </div>`;

    const userOptions = state.users.map(u =>
        `<option value="${esc(u.id)}">${esc(u.display_name)} (${esc(u.id)})</option>`
    ).join("");

    appEl.innerHTML = header + `
        <div class="p-3 space-y-3">
            <div class="form-control">
                <label class="label"><span class="label-text text-xs">To</span></label>
                <select id="compose-to" class="select select-bordered select-sm w-full">
                    <option value="">Select recipient...</option>
                    ${userOptions}
                </select>
            </div>
            <div class="form-control">
                <label class="label"><span class="label-text text-xs">Project</span></label>
                <input id="compose-project" type="text" value="general" class="input input-bordered input-sm w-full">
            </div>
            <div class="form-control">
                <label class="label"><span class="label-text text-xs">Subject (optional)</span></label>
                <input id="compose-subject" type="text" class="input input-bordered input-sm w-full">
            </div>
            <div class="form-control">
                <label class="label"><span class="label-text text-xs">Message</span></label>
                <textarea id="compose-body" rows="4" class="textarea textarea-bordered w-full text-sm" maxlength="10000"></textarea>
            </div>
            <button onclick="window.__sendCompose()" class="btn btn-primary btn-sm">Send Message</button>
        </div>`;
}

// --- Global event handlers (accessible from onclick) ---
window.__openThread = (messageId, convId) => loadThread(messageId, convId);
window.__backToInbox = () => { state.view = "inbox"; loadInbox(); };
window.__compose = async () => { state.view = "compose"; await loadUsers(); render(); };

window.__sendReply = async () => {
    const el = document.getElementById("reply-body");
    if (!el || !el.value.trim()) return;
    const thread = state.currentThread;
    if (!thread || !thread.messages?.length) return;
    const lastMsg = thread.messages[thread.messages.length - 1];
    el.disabled = true;
    await sendReply(state.currentConvId, lastMsg.id, el.value);
    el.disabled = false;
    el.value = "";
};

window.__sendCompose = async () => {
    const to = document.getElementById("compose-to")?.value;
    const body = document.getElementById("compose-body")?.value;
    const project = document.getElementById("compose-project")?.value;
    const subject = document.getElementById("compose-subject")?.value;
    if (!to || !body?.trim()) return;
    await sendNewMessage(to, body, project, subject);
};

// --- Mock mode for offline testing ---
if (new URLSearchParams(window.location.search).get("mock") === "true") {
    state.user = { user_id: "keith", display_name: "Keith" };
    state.conversations = [
        { id: "m1", conversation_id: "c1", from_user: "amy", subject: "Deploy Plan", body: "Can you check the Railway logs?", created_at: new Date(Date.now() - 3600000).toISOString(), ack_state: "pending" },
        { id: "m2", conversation_id: "c2", from_user: "bob", body: "PR #42 ready for review", created_at: new Date(Date.now() - 7200000).toISOString(), ack_state: "received" },
    ];
    state.loading = false;
    render();
}
</script>
</body>
</html>
